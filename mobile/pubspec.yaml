name: finsight_mobile
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  http: ^1.1.0
  google_fonts: ^6.1.0
  flutter_animate: ^4.2.0
  shared_preferences: ^2.2.0
  lucide_icons: ^0.257.0
  fl_chart: ^1.1.1
  intl: ^0.20.2
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  google_sign_in: ^6.2.2
  provider: ^6.1.5+1
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.2
  pdf: ^3.10.8
  local_auth: ^3.0.0
  flutter_secure_storage: ^10.0.0
  image_picker: ^1.2.1
  permission_handler: ^12.0.1
  collection: ^1.19.1
  image_cropper: ^11.0.0
  url_launcher: ^6.2.5
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
