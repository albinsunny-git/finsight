<!DOCTYPE html>
<html>

<head>
    <title>Test Notifications</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <h1>Notification Test</h1>
    <button id="testBtn" style="padding: 10px 20px; cursor: pointer;">
        <i class="fas fa-bell"></i> Test Notification Fetch
    </button>
    <div id="output" style="margin-top: 20px; padding: 20px; background: #f5f5f5; border-radius: 8px;"></div>

    <script>
        const API_URL = 'http://localhost/finsight/backend/api';

        document.getElementById('testBtn').addEventListener('click', async () => {
            const output = document.getElementById('output');
            output.innerHTML = 'Fetching notifications...';

            try {
                const response = await fetch(`${API_URL}/notifications.php?action=list`, {
                    credentials: 'include'
                });

                const data = await response.json();
                output.innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';

                console.log('Notification response:', data);
            } catch (error) {
                output.innerHTML = '<p style="color: red;">Error: ' + error.message + '</p>';
                console.error('Error fetching notifications:', error);
            }
        });

        // Check if user is logged in
        const user = localStorage.getItem('user');
        if (user) {
            document.getElementById('output').innerHTML = '<p>Logged in as: ' + JSON.parse(user).username + '</p>';
        } else {
            document.getElementById('output').innerHTML = '<p style="color: orange;">Not logged in. Please log in first.</p>';
        }
    </script>
</body>

</html>
