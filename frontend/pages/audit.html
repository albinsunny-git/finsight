<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audit Trail - FinSight</title>
  <link rel="stylesheet" href="../css/interactive-dashboard.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <i class="fas fa-chart-line"></i>
        <h2>FinSight</h2>
      </div>

      <nav class="sidebar-nav">
        <a href="../index.html" class="nav-link">
          <i class="fas fa-home"></i>
          <span>Home</span>
        </a>
        <a href="dashboard.html" class="nav-link">
          <i class="fas fa-columns"></i>
          <span>Dashboard</span>
        </a>
        <a href="users.html" class="nav-link">
          <i class="fas fa-users"></i>
          <span>Users</span>
        </a>
        <a href="accounts.html" class="nav-link">
          <i class="fas fa-sitemap"></i>
          <span>Accounts</span>
        </a>
        <a href="vouchers.html" class="nav-link">
          <i class="fas fa-receipt"></i>
          <span>Vouchers</span>
        </a>
        <a href="reports.html" class="nav-link">
          <i class="fas fa-chart-pie"></i>
          <span>Reports</span>
        </a>
        <a href="settings.html" class="nav-link">
          <i class="fas fa-cog"></i>
          <span>Settings</span>
        </a>
        <a href="audit.html" class="nav-link active">
          <i class="fas fa-shield-alt"></i>
          <span>Audit Trail</span>
        </a>
      </nav>

      <div class="sidebar-user-profile">
        <div class="sidebar-user-avatar" id="sidebarUserAvatar">A</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="sidebarUserName">Admin User</div>
          <div class="sidebar-user-role" id="sidebarUserRole">Admin</div>
        </div>
      </div>

      <div class="sidebar-footer">
        <button onclick="logout()" class="btn-logout">
          <i class="fas fa-sign-out-alt"></i>
          <span>Logout</span>
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Top Header -->
      <header class="top-header">
        <div class="header-search">
          <i class="fas fa-search"></i>
          <input type="text" placeholder="Search audit logs...">
        </div>

        <div class="header-actions">
          <button class="action-btn">
            <i class="fas fa-bell"></i>
            <span class="notification-badge"></span>
          </button>

          <div class="user-profile">
            <div class="user-avatar" id="userAvatar">A</div>
            <div class="user-info">
              <span class="user-name" id="userName">Admin User</span>
              <span class="user-role" id="userRole">Administrator</span>
            </div>
          </div>
        </div>
      </header>

      <!-- Page Content -->
      <div class="content-wrapper">
        <div class="page-header">
          <h1>Audit Trail</h1>
          <div style="display: flex; gap: 10px;">
            <input type="date" id="auditFromDate" class="form-control"
              style="padding: 8px; border-radius: 6px; border: 1px solid var(--border-color); background: var(--dark-bg); color: var(--text-main);">
            <input type="date" id="auditToDate" class="form-control"
              style="padding: 8px; border-radius: 6px; border: 1px solid var(--border-color); background: var(--dark-bg); color: var(--text-main);">
            <button class="btn btn-primary" onclick="loadAuditTrail()">Filter</button>
          </div>
        </div>

        <div class="table-container">
          <table class="data-table">
            <thead>
              <tr>
                <th>Date & Time</th>
                <th>User</th>
                <th>Action</th>
                <th>Entity</th>
                <th>Details</th>
                <th>IP Address</th>
              </tr>
            </thead>
            <tbody id="auditTableBody">
              <tr>
                <td colspan="6" style="text-align: center;">Loading...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/dashboard.js"></script>
  <script>
    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      const userStr = localStorage.getItem('user');
      if (!userStr) {
        window.location.href = '../index.html';
        return;
      }
      const user = JSON.parse(userStr);
      document.getElementById('userName').textContent = `${user.first_name} ${user.last_name}`;
      document.getElementById('userRole').textContent = user.role;
      document.getElementById('userAvatar').textContent = user.first_name.charAt(0).toUpperCase();

      loadAuditTrail();
    });
  </script>
</body>

</html>
