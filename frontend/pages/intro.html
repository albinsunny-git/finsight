<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to FinSight</title>
    <link rel="stylesheet" href="../css/interactive-dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="intro-container">
        <nav class="intro-nav">
            <div class="intro-logo">
                <i class="fas fa-chart-line"></i>
                <span>FinSight</span>
            </div>
            <div class="intro-menu">
                <a href="dashboard.html">Dashboard</a>
                <a href="reports.html">Reports</a>
                <a href="settings.html">Settings</a>
                <a href="#" onclick="logout()">Logout</a>
            </div>
            <div class="user-profile">
                <div class="user-avatar">
                    <i class="fas fa-user"></i>
                </div>
            </div>
        </nav>

        <div class="intro-hero">
            <div class="hero-content">
                <h1>Financial Clarity for<br>Modern Business</h1>
                <p>Welcome to your new command center. Manage accounts, track vouchers, and generate real-time reports
                    with our powerful new interface.</p>

                <div class="hero-actions">
                    <a href="dashboard.html" class="btn-hero btn-hero-primary">
                        <i class="fas fa-rocket"></i> Go to Dashboard
                    </a>
                    <a href="reports.html" class="btn-hero btn-hero-secondary">
                        <i class="fas fa-file-alt"></i> View Reports
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function logout() {
            localStorage.removeItem('user');
            localStorage.removeItem('sessionToken');
            window.location.href = '../index.html';
        }

        // Check authentication
        document.addEventListener('DOMContentLoaded', () => {
            const user = localStorage.getItem('user');
            if (!user) {
                window.location.href = '../index.html';
            }
        });
    </script>
</body>

</html>
