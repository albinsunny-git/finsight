<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accountant Dashboard - FinSight</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/interactive-dashboard.css?v=8">
</head>

<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="../index.html" class="brand-logo">
                    <i class="fas fa-chart-line"></i>
                    <span class="brand-logo-name">FINSIGHT</span>
                </a>
            </div>

            <nav class="sidebar-nav">
                <!-- Set by admin-dashboard.js based on role -->
            </nav>

            <div class="sidebar-user-profile">
                <div class="sidebar-user-avatar" id="sidebarUserAvatar">A</div>
                <div class="sidebar-user-info">
                    <div class="sidebar-user-name" id="sidebarUserName">User</div>
                    <div class="sidebar-user-role" id="sidebarUserRole">Accountant</div>
                </div>
            </div>

            <div class="sidebar-footer">
                <button onclick="logout()" class="btn-logout">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="main-content">
            <header class="header">
                <div class="header-title">
                    <h1>Dashboard</h1>
                </div>

                <div class="header-actions">
                    <button class="btn-icon" id="notificationBtn"
                        style="cursor: pointer; position: relative; z-index: 100;">
                        <i class="fas fa-bell"></i>
                        <span class="notification-badge"></span>
                    </button>

                    <div class="user-menu">
                        <div class="user-avatar" id="userAvatar">A</div>
                        <div class="user-info">
                            <div class="user-name" id="userName">User</div>
                            <div class="user-role" id="userRole">Accountant</div>
                        </div>
                    </div>
                </div>
            </header>

            <div class="page-content">
                <!-- Stats Grid -->
                <!-- Showing Vouchers Stats Specific to Accountant Tasks -->
                <!-- Financial Stats -->
                <div class="stats-grid" style="margin-bottom: 24px;">
                    <div class="stat-card">
                        <div class="stat-icon green">
                            <i class="fas fa-coins"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="stat-revenue">₹0.00</h3>
                            <p>Total Revenue</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon red">
                            <i class="fas fa-wallet"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="stat-expenses">₹0.00</h3>
                            <p>Total Expenses</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon blue">
                            <i class="fas fa-chart-line"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="stat-profit">₹0.00</h3>
                            <p>Net Profit</p>
                        </div>
                    </div>
                </div>

                <!-- Voucher Stats -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon blue">
                            <i class="fas fa-receipt"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="stat-draft-vouchers">0</h3>
                            <p>Draft Vouchers</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon green">
                            <i class="fas fa-check-circle"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="stat-posted-vouchers">0</h3>
                            <p>Posted Vouchers</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon red">
                            <i class="fas fa-times-circle"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="stat-rejected-vouchers">0</h3>
                            <p>Rejected Vouchers</p>
                        </div>
                    </div>
                </div>

                <!-- Recent Activity / Vouchers could go here -->
                <div class="table-container" style="margin-top: 30px;">
                    <div class="section-header">
                        <h3>Recent Vouchers</h3>
                    </div>
                    <!-- Using standard vouchers table structure usually found in vouchers.html, 
                         but for dashboard maybe just a simple list or none. 
                         Let's keep it simple for now as the user didn't specify detailed dashboard content, 
                         just the "dashboard" item. I'll rely on loadAccountantStats() to populate the numbers.
                    -->
                    <div style="padding: 40px; text-align: center; color: var(--text-muted);">
                        <i class="fas fa-chart-bar" style="font-size: 48px; margin-bottom: 20px; opacity: 0.5;"></i>
                        <p>Detailed analytics and charts coming soon.</p>
                        <a href="vouchers.html" class="btn btn-primary" style="margin-top: 20px;">
                            <i class="fas fa-arrow-right"></i> Go to Vouchers
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../js/admin-dashboard.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            console.log('Accountant dashboard loading...');

            // Re-use the main dashboard init logic which handles auth and sidebar
            await initAdminDashboard();

            // Extra check to ensure notification button is working
            setTimeout(() => {
                const bellBtn = document.getElementById('notificationBtn');
                if (bellBtn) {
                    console.log('Bell button found, ensuring click handler...');

                    // Test click
                    bellBtn.addEventListener('click', function (e) {
                        console.log('DIRECT CLICK HANDLER: Bell clicked!');
                    });
                } else {
                    console.error('Bell button NOT found!');
                }
            }, 1000);
        });
    </script>
</body>

</html>
