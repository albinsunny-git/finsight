<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - FinSight</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/interactive-dashboard.css?v=8">
    <script src="../js/dashboard.js"></script>
    <style>
        .feedback-form-container {
            background: var(--bg-card);
            padding: 30px;
            border-radius: var(--radius-lg);
            max-width: 700px;
            margin: 0 auto;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
        }

        .feedback-type-selector {
            display: flex;
            gap: 20px;
            margin-bottom: 24px;
        }

        .feedback-type-option {
            flex: 1;
            padding: 16px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }

        .feedback-type-option:hover {
            border-color: var(--primary-light);
            background: #f9fafb;
        }

        .feedback-type-option.active {
            border-color: var(--primary-color);
            background: #f0fdf4;
            color: var(--primary-color);
            font-weight: 600;
        }

        .feedback-type-option i {
            display: block;
            font-size: 24px;
            margin-bottom: 8px;
        }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="../index.html" class="brand-logo">
                    <i class="fas fa-chart-line"></i>
                    <span class="brand-logo-name">FINSIGHT</span>
                </a>
            </div>

            <nav class="sidebar-nav">
                <!-- Dynamically filled -->
            </nav>

            <div class="sidebar-user-profile">
                <div class="sidebar-user-avatar" id="sidebarUserAvatar">U</div>
                <div class="sidebar-user-info">
                    <div class="sidebar-user-name" id="sidebarUserName">User</div>
                    <div class="sidebar-user-role" id="sidebarUserRole">Role</div>
                </div>
            </div>

            <div class="sidebar-footer">
                <button onclick="logout()" class="btn-logout">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="main-content">
            <header class="header">
                <div class="header-title">
                    <h1>Send Feedback</h1>
                </div>

                <div class="header-actions">
                    <button class="btn-icon" id="notificationBtn">
                        <i class="fas fa-bell"></i>
                        <span class="notification-badge"></span>
                    </button>

                    <div class="user-menu">
                        <div class="user-avatar" id="userAvatar">U</div>
                        <div class="user-info">
                            <div class="user-name" id="userName">User</div>
                            <div class="user-role" id="userRole">Role</div>
                        </div>
                    </div>
                </div>
            </header>

            <div class="page-content">
                <div class="feedback-form-container">
                    <div style="display: flex; border-bottom: 2px solid var(--border-color); margin-bottom: 24px;">
                        <div class="tab-item active" onclick="switchTab('compose')" id="tabCompose"
                            style="padding: 12px 24px; cursor: pointer; font-weight: 600; color: var(--primary-color); border-bottom: 2px solid var(--primary-color);">
                            Compose</div>
                        <div class="tab-item" onclick="switchTab('history')" id="tabHistory"
                            style="padding: 12px 24px; cursor: pointer; font-weight: 500; color: var(--text-muted);">
                            History</div>
                    </div>

                    <div id="composeSection">
                        <form id="feedbackForm" onsubmit="handleFeedbackSubmit(event)">
                            <!-- Existing Form Content -->
                            <h2 style="margin-bottom: 24px; font-size: 20px; color: var(--text-main);"><i
                                    class="fas fa-paper-plane"
                                    style="color: var(--primary-color); margin-right: 10px;"></i>
                                Compose Feedback</h2>

                            <div class="feedback-type-selector">
                                <div class="feedback-type-option active" onclick="setFeedbackType('group')"
                                    id="optGroup">
                                    <i class="fas fa-users"></i>
                                    Group Mail (Role)
                                </div>
                                <div class="feedback-type-option" onclick="setFeedbackType('individual')"
                                    id="optIndividual">
                                    <i class="fas fa-user"></i>
                                    Individual User
                                </div>
                            </div>

                            <!-- Recipient Selection -->
                            <div class="form-group" id="groupSelectGroup">
                                <label><i class="fas fa-user-tag"></i> Select Role Group</label>
                                <select id="recipientRole" class="form-control" onchange="countRecipients()">
                                    <option value="admin">Administrators</option>
                                    <option value="manager">Managers</option>
                                    <option value="accountant">Accountants</option>
                                    <option value="auditor">Auditors</option>
                                </select>
                                <small id="recipientCount"
                                    style="color: var(--text-muted); display: block; margin-top: 5px;">Fetching
                                    recipient
                                    info...</small>
                            </div>

                            <div class="form-group" id="individualSelectGroup" style="display: none;">
                                <label><i class="fas fa-user-check"></i> Select User</label>
                                <select id="recipientUser" class="form-control">
                                    <option value="">Loading users...</option>
                                </select>
                            </div>

                            <div class="form-group full-width">
                                <label><i class="fas fa-heading"></i> Subject</label>
                                <input type="text" id="feedbackSubject" required
                                    placeholder="Regarding: Quarterly Report Discrepancy">
                            </div>

                            <div class="form-group full-width">
                                <label><i class="fas fa-align-left"></i> Message</label>
                                <textarea id="feedbackMessage" rows="6" required
                                    placeholder="Type your feedback here..."
                                    style="width: 100%; border: 1px solid var(--border-color); border-radius: 8px; padding: 12px; font-family: inherit; resize: vertical;"></textarea>
                            </div>

                            <button type="submit" class="btn btn-primary"
                                style="width: 100%; justify-content: center; padding: 16px; font-size: 16px; font-weight: 700;">
                                <i class="fas fa-paper-plane"></i> Send Feedback
                            </button>
                        </form>
                    </div>

                    <div id="historySection" style="display: none;">
                        <h2 style="margin-bottom: 24px; font-size: 20px; color: var(--text-main);"><i
                                class="fas fa-history" style="color: var(--primary-color); margin-right: 10px;"></i>
                            Sent History</h2>
                        <div id="historyList">
                            <div style="text-align: center; padding: 40px; color: var(--text-muted);">Loading history...
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/admin-dashboard.js"></script>
    <script>
        let allUsers = [];
        let currentType = 'group';

        document.addEventListener('DOMContentLoaded', async () => {
            await initAdminDashboard(); // Loads sidebar and auth
            await fetchUsersForFeedback();
        });

        function switchTab(tab) {
            if (tab === 'compose') {
                document.getElementById('composeSection').style.display = 'block';
                document.getElementById('historySection').style.display = 'none';
                document.getElementById('tabCompose').classList.add('active');
                document.getElementById('tabCompose').style.borderBottom = '2px solid var(--primary-color)';
                document.getElementById('tabCompose').style.color = 'var(--primary-color)';

                document.getElementById('tabHistory').classList.remove('active');
                document.getElementById('tabHistory').style.borderBottom = 'none';
                document.getElementById('tabHistory').style.color = 'var(--text-muted)';
            } else {
                document.getElementById('composeSection').style.display = 'none';
                document.getElementById('historySection').style.display = 'block';
                document.getElementById('tabHistory').classList.add('active');
                document.getElementById('tabHistory').style.borderBottom = '2px solid var(--primary-color)';
                document.getElementById('tabHistory').style.color = 'var(--primary-color)';

                document.getElementById('tabCompose').classList.remove('active');
                document.getElementById('tabCompose').style.borderBottom = 'none';
                document.getElementById('tabCompose').style.color = 'var(--text-muted)';

                loadFeedbackHistory();
            }
        }

        async function loadFeedbackHistory() {
            const listContainer = document.getElementById('historyList');
            try {
                const res = await fetchWithTimeout(`${API_URL}/feedback.php?action=get_history`, { credentials: 'include' });
                const data = await res.json();

                if (data.success) {
                    if (data.data.length === 0) {
                        listContainer.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--text-muted);">No feedback sent yet.</div>';
                        return;
                    }

                    listContainer.innerHTML = data.data.map(item => `
                    <div style="border: 1px solid var(--border-color); padding: 16px; border-radius: 8px; margin-bottom: 12px; background: #fff;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                            <strong style="color: var(--text-main); font-size: 16px;">${item.subject}</strong>
                            <small style="color: var(--text-muted);">${new Date(item.sent_at).toLocaleString()}</small>
                        </div>
                        <div style="font-size: 13px; color: var(--text-muted); margin-bottom: 8px;">To: ${item.recipients}</div>
                        <div style="background: #f9fafb; padding: 10px; border-radius: 6px; font-size: 14px; color: var(--text-main); white-space: pre-wrap;">${item.message}</div>
                    </div>
                `).join('');
                } else {
                    listContainer.innerHTML = '<div style="text-align: center; color: red;">Failed to load history.</div>';
                }
            } catch (e) {
                console.error(e);
                listContainer.innerHTML = '<div style="text-align: center; color: red;">Error loading history.</div>';
            }
        }

        async function fetchUsersForFeedback() {
            try {
                const res = await fetchWithTimeout(`${API_URL}/users.php?action=list`, { credentials: 'include' });
                const data = await res.json();
                if (data.success) {
                    allUsers = data.data;
                    populateUserDropdown();
                    countRecipients(); // Initial count for 'admin'
                }
            } catch (e) {
                console.error('Failed to load users for feedback', e);
                document.getElementById('recipientCount').textContent = 'Error loading user directory.';
            }
        }

        function setFeedbackType(type) {
            currentType = type;
            document.getElementById('optGroup').className = `feedback-type-option ${type === 'group' ? 'active' : ''}`;
            document.getElementById('optIndividual').className = `feedback-type-option ${type === 'individual' ? 'active' : ''}`;

            document.getElementById('groupSelectGroup').style.display = type === 'group' ? 'block' : 'none';
            document.getElementById('individualSelectGroup').style.display = type === 'individual' ? 'block' : 'none';
        }

        function populateUserDropdown() {
            const select = document.getElementById('recipientUser');
            select.innerHTML = '<option value="">-- Select Person --</option>';
            allUsers.sort((a, b) => a.first_name.localeCompare(b.first_name)).forEach(u => {
                // Filter strictly inactive? Maybe allow feedback to inactive users? Probably not.
                if (u.is_active == 1) {
                    const opt = document.createElement('option');
                    opt.value = u.email;
                    opt.textContent = `${u.first_name} ${u.last_name} (${u.role})`;
                    select.appendChild(opt);
                }
            });
        }

        function countRecipients() {
            if (currentType !== 'group') return;
            const role = document.getElementById('recipientRole').value;
            const count = allUsers.filter(u => u.role.toLowerCase() === role && u.is_active == 1).length;
            document.getElementById('recipientCount').textContent = `${count} recipient(s) found in this group`;
        }

        async function handleFeedbackSubmit(e) {
            e.preventDefault();

            let emails = [];

            if (currentType === 'group') {
                const role = document.getElementById('recipientRole').value;
                emails = allUsers
                    .filter(u => u.role.toLowerCase() === role && u.is_active == 1 && u.email)
                    .map(u => u.email);
            } else {
                const email = document.getElementById('recipientUser').value;
                if (email) emails.push(email);
            }

            if (emails.length === 0) {
                alert('No valid recipients found for selection.');
                return;
            }

            const subject = document.getElementById('feedbackSubject').value;
            const message = document.getElementById('feedbackMessage').value;
            const btn = e.submitter;
            const originalText = btn.innerHTML;

            try {
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';

                const response = await fetchWithTimeout(`${API_URL}/feedback.php?action=send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        recipients: emails,
                        subject: subject,
                        message: message
                    }),
                    credentials: 'include',
                    timeout: 30000 // Increase timeout to 30s for SMTP
                });

                const data = await response.json();

                if (data.success) {
                    alert('Feedback sent successfully to ' + data.data.sent + ' recipient(s).');
                    e.target.reset();
                    // Optionally switch to history
                    // switchTab('history');
                } else {
                    alert('Failed to send feedback: ' + (data.message || 'Unknown error'));
                }
            } catch (error) {
                console.error('Feedback send error:', error);
                alert('Error sending feedback. Please try again later.');
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        }
    </script>
</body>

</html>
