<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - FinSight</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/modern-dashboard.css?v=11">
</head>

<body>
    <div class="auth-container">
        <!-- Left Banner Side -->
        <div class="auth-banner">
            <div class="auth-banner-content">
                <h1>Secure Your<br>Account</h1>
                <p>Create a strong and unique password to keep your FinSight account protected.</p>
                <ul
                    style="list-style: none; padding: 0; margin-top: 2rem; color: rgba(255,255,255,0.9); font-size: 1.1rem; line-height: 2;">
                    <li><i class="fas fa-lock" style="width: 24px; color: white;"></i> Must be at least 8 characters
                    </li>
                    <li><i class="fas fa-check" style="width: 24px; color: white;"></i> Use uppercase & lowercase</li>
                    <li><i class="fas fa-key" style="width: 24px; color: white;"></i> Include numbers & symbols</li>
                </ul>
            </div>
        </div>

        <!-- Right Form Side -->
        <div class="auth-form-wrapper">
            <div class="auth-box">
                <div class="auth-header">
                    <div class="brand-logo"
                        style="margin-bottom: 2rem; color: var(--primary-color); display: flex; align-items: center; justify-content: center; font-size: 1.75rem;">
                        <i class="fas fa-chart-line" style="margin-right:0.5rem; color: var(--secondary-color);"></i>
                        <span class="brand-logo-name"
                            style="color: var(--primary-color); font-weight: 800;">FINSIGHT</span>
                    </div>
                    <h2>Reset Your Password</h2>
                    <p>Enter your new password below</p>
                </div>

                <div id="reset-form">
                    <form id="resetPasswordForm" method="POST">
                        <div class="form-group floating">
                            <input type="password" id="new_password" name="password" required placeholder=" "
                                oninput="document.getElementById('password_error').style.display='none'">
                            <label>New Password</label>
                            <button type="button" class="toggle-password" onclick="togglePassword('new_password')"
                                style="position: absolute; right: 1rem; top: 1.25rem; background: none; border: none; font-size: 1rem; color: var(--text-muted); cursor: pointer;">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <small class="error-message" id="password_error"
                            style="color: var(--danger-color); font-size: 13px; margin-top: -10px; margin-bottom: 15px; display: none;"></small>

                        <div class="form-group floating">
                            <input type="password" id="confirm_password" name="confirm_password" required
                                placeholder=" "
                                oninput="document.getElementById('confirm_password_error').style.display='none'">
                            <label>Confirm Password</label>
                            <button type="button" class="toggle-password" onclick="togglePassword('confirm_password')"
                                style="position: absolute; right: 1rem; top: 1.25rem; background: none; border: none; font-size: 1rem; color: var(--text-muted); cursor: pointer;">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <small class="error-message" id="confirm_password_error"
                            style="color: var(--danger-color); font-size: 13px; margin-top: -10px; margin-bottom: 15px; display: none;"></small>

                        <button type="submit" class="btn btn-primary btn-block"
                            style="padding: 1rem; font-size: 1rem; justify-content: center; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);">
                            Reset Password
                        </button>

                        <div style="text-align: center; margin-top: 15px;">
                            <small class="error-message" id="reset_error"
                                style="color: var(--danger-color); font-weight: 600; display: none;"></small>
                            <small class="success-message" id="reset_success"
                                style="color: var(--success-color); font-weight: 600; display: none;"></small>
                        </div>
                    </form>

                    <div style="text-align: center; margin-top: 2rem; color: var(--text-muted); font-size: 14px;">
                        <p><a href="../index.html"
                                style="color: var(--secondary-color); font-weight: 600; text-decoration: none;">Back to
                                Sign In</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost/finsight/backend/api/auth.php';

        function togglePassword(fieldId) {
            const field = document.getElementById(fieldId);
            const type = field.type === 'password' ? 'text' : 'password';
            field.type = type;

            // Toggle icon
            const icon = field.parentElement.querySelector('.fas');
            if (icon) {
                icon.className = type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
            }
        }

        function validatePassword(password) {
            const re = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;
            return re.test(password);
        }

        function showError(elementId, message) {
            const element = document.getElementById(elementId);
            if (element) {
                element.textContent = message;
                element.style.display = 'block';
            }
        }

        function clearErrors() {
            ['password_error', 'confirm_password_error', 'reset_error', 'reset_success'].forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.textContent = '';
                    el.style.display = 'none';
                }
            });
        }

        // Get token from URL
        function getTokenFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get('token');
        }

        document.getElementById('resetPasswordForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearErrors();

            const password = document.getElementById('new_password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            const token = getTokenFromURL();

            if (!token) {
                showError('reset_error', 'Invalid or missing reset token');
                return;
            }

            let isValid = true;

            if (!validatePassword(password)) {
                showError('password_error', 'Requires 8+ chars, uppercase, lowercase, number, & special char');
                isValid = false;
            }

            if (password !== confirmPassword) {
                showError('confirm_password_error', 'Passwords do not match');
                isValid = false;
            }

            if (!isValid) return;

            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.textContent;
            submitBtn.disabled = true;
            submitBtn.textContent = 'Processing...';

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token: token,
                        password: password,
                        confirm_password: confirmPassword,
                        action: 'reset-password'
                    })
                });

                const data = await response.json();

                if (data.success) {
                    const successEl = document.getElementById('reset_success');
                    successEl.textContent = 'Password reset successfully! Redirecting to login...';
                    successEl.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = '../index.html';
                    }, 2000);
                } else {
                    showError('reset_error', data.message || 'Password reset failed');
                }
            } catch (error) {
                showError('reset_error', 'An error occurred. Please try again.');
                console.error('Reset password error:', error);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        });

        // Validate token on page load
        window.addEventListener('load', () => {
            const token = getTokenFromURL();
            if (!token) {
                showError('reset_error', 'Invalid reset link. Please request a new password reset.');
            }
        });
    </script>
</body>

</html>
