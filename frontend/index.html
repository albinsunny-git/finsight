<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinSight - Modern Accounting</title>
    <link rel="stylesheet" href="css/interactive-dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="landing-container">
        <nav class="landing-nav">
            <a href="index.html" class="brand-logo">
                <i class="fas fa-chart-line"></i>
                <span class="brand-logo-name">FINSIGHT</span>
            </a>
            <div class="landing-actions">
                <button onclick="showLoginModal()" class="btn btn-primary" id="navLoginBtn">Login</button>
            </div>
        </nav>

        <div class="landing-hero">
            <div class="hero-content">
                <h1>Financial Clarity for<br>Modern Business</h1>
                <p>Manage accounts, track vouchers, and generate real-time reports with our powerful new interface.</p>
                <div class="hero-actions">
                    <button onclick="showLoginModal()" class="btn btn-primary btn-lg" id="heroLoginBtn">
                        Get Started <i class="fas fa-arrow-right"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Welcome Back</h2>
                <button onclick="closeLoginModal()" class="close-modal">&times;</button>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Email or Username</label>
                    <input type="text" id="email_or_username" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="Enter your password">
                    <div style="text-align: right; margin-top: 5px;">
                        <a href="pages/forgot-password.html"
                            style="color: var(--primary-color); font-size: 13px; text-decoration: none;">Forgot
                            Password?</a>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">Sign
                    In</button>

                <div style="text-align: center; margin-top: 20px; color: var(--text-muted); font-size: 14px;">
                    <p>Don't have an account? <a href="#" style="color: var(--primary-color);">Contact Admin</a></p>
                </div>

                <div id="login_error"
                    style="color: var(--danger-color); margin-top: 10px; font-size: 14px; text-align: center; display: none;">
                </div>
            </form>

            <div style="margin-top: 20px; border-top: 1px solid var(--border-color); padding-top: 20px;">
                <div id="g_id_onload"
                    data-client_id="235402120316-oi9307meejpv5jlbtt7b4lfr4remn8js.apps.googleusercontent.com"
                    data-callback="handleGoogleSignIn" data-auto_prompt="false">
                </div>
                <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline"
                    data-text="sign_in_with" data-shape="rectangular" data-logo_alignment="left" data-width="100%">
                </div>
            </div>
        </div>
    </div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="js/auth.js"></script>
    <script>
        // Check if already logged in
        document.addEventListener('DOMContentLoaded', () => {
            // Apply saved appearance settings
            const appearance = JSON.parse(localStorage.getItem('appearance_settings') || '{}');
            const theme = appearance.theme || 'light';
            document.documentElement.setAttribute('data-theme', theme);

            // Apply accent color
            const accentColor = appearance.accentColor || '#ef4444';
            document.documentElement.style.setProperty('--primary-color', accentColor);

            const user = localStorage.getItem('user');

            // Check for error parameters in URL
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('error') === 'session_expired') {
                const loginError = document.getElementById('login_error');
                if (loginError) {
                    loginError.textContent = 'Session expired. Please sign in again.';
                    loginError.style.display = 'block';
                    loginError.style.color = 'var(--warning-color, #f59e0b)';
                }
                showLoginModal();
            }

            if (user) {
                const userData = JSON.parse(user);
                const role = userData.role ? userData.role.toLowerCase() : 'user';
                const dashboardUrl = role === 'accountant' ? 'pages/accountant.html' : 'pages/dashboard.html';

                const navBtn = document.getElementById('navLoginBtn');
                const heroBtn = document.getElementById('heroLoginBtn');

                if (navBtn) {
                    navBtn.textContent = 'Go to Dashboard';
                    navBtn.onclick = () => window.location.href = dashboardUrl;
                }

                if (heroBtn) {
                    heroBtn.textContent = 'Go to Dashboard';
                    heroBtn.onclick = () => window.location.href = dashboardUrl;
                }
            } else {
                // Auto-show login modal if not logged in (acts as redirect to login)
                showLoginModal();
            }
        });

        function showLoginModal() {
            document.getElementById('loginModal').classList.add('active');
        }

        function closeLoginModal() {
            document.getElementById('loginModal').classList.remove('active');
        }

        // Close modal on outside click
        window.onclick = function (event) {
            const modal = document.getElementById('loginModal');
            if (event.target == modal) {
                closeLoginModal();
            }
        }
    </script>
</body>

</html>
