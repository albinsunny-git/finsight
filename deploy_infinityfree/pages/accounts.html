<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chart of Accounts - FinSight</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/modern-dashboard.css?v=12">
</head>

<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="../index.html" class="brand-logo">
                    <i class="fas fa-chart-line"></i>
                    <span class="brand-logo-name">FINSIGHT</span>
                </a>
            </div>

            <nav class="sidebar-nav">

                <a href="dashboard.html" class="nav-link">
                    <i class="fas fa-columns"></i>
                    <span>Dashboard</span>
                </a>
                <a href="users.html" class="nav-link">
                    <i class="fas fa-users"></i>
                    <span>Users</span>
                </a>
                <a href="accounts.html" class="nav-link active">
                    <i class="fas fa-sitemap"></i>
                    <span>Accounts</span>
                </a>
                <a href="vouchers.html" class="nav-link">
                    <i class="fas fa-receipt"></i>
                    <span>Vouchers</span>
                </a>
                <a href="reports.html" class="nav-link">
                    <i class="fas fa-chart-pie"></i>
                    <span>Reports</span>
                </a>
                <a href="settings.html" class="nav-link">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </a>
            </nav>

            <div class="sidebar-user-profile">
                <div class="sidebar-user-avatar" id="sidebarUserAvatar">A</div>
                <div class="sidebar-user-info">
                    <div class="sidebar-user-name" id="sidebarUserName">Admin User</div>
                    <div class="sidebar-user-role" id="sidebarUserRole">Admin</div>
                </div>
            </div>

            <div class="sidebar-footer">
                <button onclick="logout()" class="btn-logout">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="header">
                <div class="header-title">
                    <h1>Chart of Accounts</h1>
                </div>

                <div class="header-actions">
                    <button class="btn-icon" id="notificationBtn">
                        <i class="fas fa-bell"></i>
                        <span class="notification-badge"></span>
                    </button>

                    <div class="user-menu">
                        <div class="user-avatar" id="userAvatar">A</div>
                        <div class="user-info">
                            <div class="user-name" id="userName">Admin User</div>
                            <div class="user-role" id="userRole">Administrator</div>
                        </div>
                    </div>
                </div>
            </header>

            <div class="page-content">
                <div class="section-header" style="display: flex; justify-content: space-between; align-items: center;">
                    <h2>All Accounts</h2>
                    <button class="btn btn-primary" onclick="showAddAccountModal()">
                        <i class="fas fa-plus-circle"></i> Create Account
                    </button>
                </div>

                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Code</th>
                                <th>Account Name</th>
                                <th>Type</th>
                                <th>Balance</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="accountsTableBody">
                            <tr>
                                <td colspan="6" style="text-align: center;">Loading...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Add Account Modal -->
    <div id="addAccountModal" class="modal">
        <div class="modal-content" style="max-width: 700px;">
            <div class="modal-header">
                <h2><i class="fas fa-folder-plus" style="color: var(--secondary-color); margin-right: 10px;"></i>New
                    Account</h2>
                <button onclick="closeModal('addAccountModal')" class="close-modal">&times;</button>
            </div>
            <form id="addAccountForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label><i class="fas fa-hashtag"></i> Account Code</label>
                        <input type="text" id="newAccountCode" placeholder="e.g. 1001" required>
                        <small style="color: var(--text-muted); font-size: 11px; margin-top: 4px;">Unique identifier for
                            this account</small>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-layer-group"></i> Account Type</label>
                        <select id="newAccountType" required>
                            <option value="">Select Type</option>
                            <option value="Asset">Asset</option>
                            <option value="Liability">Liability</option>
                            <option value="Equity">Equity</option>
                            <option value="Income">Income</option>
                            <option value="Expense">Expense</option>
                        </select>
                    </div>
                    <div class="form-group full-width">
                        <label><i class="fas fa-file-signature"></i> Account Name</label>
                        <input type="text" id="newAccountName" placeholder="e.g. Petty Cash Account" required>
                    </div>
                    <div class="form-group full-width">
                        <label><i class="fas fa-align-left"></i> Description (Optional)</label>
                        <textarea id="newAccountDescription" rows="3"
                            placeholder="Brief description of this account's purpose..."
                            style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 10px; background: #f9fafb; resize: vertical; font-family: inherit;"></textarea>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-rupee-sign"></i> Opening Balance</label>
                        <input type="number" id="newAccountBalance" placeholder="0.00" step="0.01">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-toggle-on"></i> Status</label>
                        <select id="newAccountStatus">
                            <option value="1">Active</option>
                            <option value="0">Inactive</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary"
                    style="width: 100%; margin-top: 20px; padding: 16px; justify-content: center; font-size: 16px; font-weight: 700;">
                    <i class="fas fa-check-circle"></i> Create Account
                </button>
            </form>
        </div>
    </div>



    <script src="../js/dashboard.js"></script>
    <script src="../js/admin-dashboard.js"></script>
    <script>
        function showAddAccountModal() {
            const modal = document.getElementById('addAccountModal');
            if (modal) modal.classList.add('active');
            // reset form if needed
            const form = document.getElementById('addAccountForm');
            if (form) form.reset();
            const title = modal.querySelector('h2');
            const btn = modal.querySelector('button[type="submit"]');
            if (title) title.innerHTML = '<i class="fas fa-folder-plus" style="color: var(--secondary-color); margin-right: 10px;"></i>New Account';
            if (btn) btn.innerHTML = '<i class="fas fa-check-circle"></i> Create Account';
        }
    </script>
</body>

</html>
