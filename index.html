<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinSight - Modern Accounting</title>
    <link rel="stylesheet" href="css/modern-dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="auth-container">
        <!-- Left Banner Side -->
        <div class="auth-banner">
            <div class="auth-banner-content">
                <h1>Financial Clarity<br>for Modern Business</h1>
                <p>Manage accounts, track vouchers, and generate real-time reports with our powerful new interface.</p>
            </div>
        </div>

        <!-- Right Form Side -->
        <div class="auth-form-wrapper">
            <div class="auth-box">
                <div class="auth-header">
                    <div class="brand-logo" style="margin-bottom: 2rem; display: flex; align-items: center; gap: 12px;">
                        <img src="assets/images/logo.png" alt="FinSight Logo" style="height: 40px; width: 40px; border-radius: 8px;">
                        <span class="brand-logo-name" style="color: var(--primary-color); font-weight: 800; letter-spacing: -0.5px;">FINSIGHT</span>
                    </div>
                    <h2>Welcome Back</h2>
                    <p>Please sign in to your account</p>
                </div>

                <form id="loginForm">
                    <div id="login_error"
                        style="color: var(--danger-color); background: #fee2e2; padding: 10px; border-radius: 8px; margin-bottom: 1rem; font-size: 14px; text-align: center; display: none;">
                    </div>

                    <div class="form-group floating">
                        <input type="text" id="email_or_username" required placeholder=" ">
                        <label>Email or Username</label>
                    </div>

                    <div class="form-group floating" style="margin-bottom: 1rem;">
                        <input type="password" id="password" required placeholder=" ">
                        <label>Password</label>
                    </div>

                    <div style="text-align: right; margin-bottom: 1.5rem;">
                        <a href="pages/forgot-password.html"
                            style="color: var(--secondary-color); font-weight: 600; font-size: 13px; text-decoration: none;">Forgot
                            Password?</a>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block"
                        style="padding: 1rem; font-size: 1rem; justify-content: center; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);">
                        Sign In
                    </button>

                    <div class="auth-divider">
                        <span>OR CONTINUE WITH</span>
                    </div>

                    <div id="g_id_onload"
                        data-client_id="235402120316-oi9307meejpv5jlbtt7b4lfr4remn8js.apps.googleusercontent.com"
                        data-callback="handleGoogleSignIn" data-auto_prompt="false">
                    </div>
                    <div class="g_id_signin" data-type="standard" data-size="large" data-theme="filled_black"
                        data-text="sign_in_with" data-shape="rectangular" data-logo_alignment="center"
                        data-width="100%">
                    </div>

                    <div style="text-align: center; margin-top: 2rem; color: var(--text-muted); font-size: 14px;">
                        <p>Don't have an account? <a href="#"
                                style="color: var(--secondary-color); font-weight: 600;">Contact Admin</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="js/auth.js?v=15"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Apply saved appearance settings
            const appearance = JSON.parse(localStorage.getItem('appearance_settings') || '{}');
            const theme = appearance.theme || 'light';
            document.documentElement.setAttribute('data-theme', theme);

            const user = localStorage.getItem('user');

            // Check for error parameters in URL
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('error') === 'session_expired') {
                const loginError = document.getElementById('login_error');
                if (loginError) {
                    loginError.textContent = 'Session expired. Please sign in again.';
                    loginError.style.display = 'block';
                    loginError.style.color = 'var(--warning-color, #f59e0b)';
                }
            }

            // Redirect to dashboard if logged in
            if (user) {
                window.location.href = 'pages/dashboard.html';
            }
        });

        // Dummy functions as backwards compatibility for auth.js if it calls them
        function showLoginModal() { }
        function closeLoginModal() { }
    </script>
</body>

</html>
