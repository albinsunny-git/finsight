<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Report - FinSight</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #1e293b;
            --secondary-color: #334155;
            --border-color: #e2e8f0;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #f1f5f9;
            padding: 40px;
            color: var(--text-main);
        }

        .print-container {
            background: white;
            width: 210mm;
            min-height: 297mm;
            margin: 0 auto;
            padding: 20mm;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }

            .print-container {
                width: 100%;
                margin: 0;
                box-shadow: none;
                padding: 10mm;
            }

            .no-print {
                display: none;
            }
        }

        /* Company Header */
        .company-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .brand-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-section i {
            font-size: 32px;
            color: var(--primary-color);
        }

        .brand-name {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--primary-color);
        }

        .company-details {
            text-align: right;
            font-size: 13px;
            line-height: 1.6;
            color: var(--text-muted);
        }

        .company-details strong {
            color: var(--text-main);
            font-size: 14px;
        }

        /* Report Header */
        .report-title-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .report-title-section h1 {
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        .report-period {
            font-size: 14px;
            color: var(--text-muted);
        }

        /* Table Styles */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }

        th {
            background: #f8fafc;
            border: 1px solid var(--border-color);
            padding: 12px;
            text-align: left;
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        td {
            border: 1px solid var(--border-color);
            padding: 12px;
            font-size: 14px;
        }

        .text-right {
            text-align: right;
        }

        .font-bold {
            font-weight: 700;
        }

        .bg-light {
            background: #f8fafc;
        }

        .total-row {
            background: var(--primary-color) !important;
            color: white !important;
            font-weight: 700;
        }

        /* Signature Section */
        .signature-section {
            margin-top: 80px;
            display: flex;
            justify-content: space-between;
        }

        .sig-box {
            width: 200px;
            text-align: center;
        }

        .sig-line {
            border-top: 1px solid var(--text-main);
            margin-bottom: 10px;
        }

        .sig-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
        }

        /* Controls */
        .controls {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }

        .btn-print {
            background: #1e293b;
            color: white;
        }

        .btn-close {
            background: #e2e8f0;
            color: #475569;
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
    </style>
</head>

<body>

    <div class="controls no-print">
        <button class="btn btn-close" onclick="window.close()">
            <i class="fas fa-times"></i> Close
        </button>
        <button class="btn btn-print" onclick="window.print()">
            <i class="fas fa-print"></i> Print as PDF
        </button>
    </div>

    <div class="print-container">
        <!-- Header -->
        <div class="company-header">
            <div class="brand-section">
                <i class="fas fa-chart-line"></i>
                <span class="brand-name">FINSIGHT</span>
            </div>
            <div class="company-details">
                <strong>FINSIGHT TECHNOLOGIES PVT LTD</strong><br>
                Corporate Office: 123, Business Hub, BKC, Mumbai - 400051<br>
                GSTIN: 27AAAAA0000A1Z5 | PAN: AAAAA0000A<br>
                Email: accounts@finsight.com | Web: www.finsight.com
            </div>
        </div>

        <!-- Title -->
        <div class="report-title-section">
            <h1 id="reportTitle">BALANCE SHEET</h1>
            <p class="report-period" id="reportDate">As of June 15, 2025</p>
        </div>

        <!-- Content -->
        <div id="reportContent">
            <!-- Dynamic Content Here -->
        </div>

        <!-- Signatures -->
        <div class="signature-section">
            <div class="sig-box">
                <div class="sig-line"></div>
                <div class="sig-label">Prepared By</div>
            </div>
            <div class="sig-box">
                <div class="sig-line"></div>
                <div class="sig-label">Authorized Signatory</div>
            </div>
        </div>
    </div>

    <script src="../js/admin-dashboard.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const type = urlParams.get('type') || 'balance-sheet';

            // Fetch data from API
            try {
                const res = await fetch(`${API_URL}/reports.php?type=${type}`, { credentials: 'include' });
                const json = await res.json();

                if (json.success) {
                    const today = new Date().toLocaleDateString('en-IN', { year: 'numeric', month: 'long', day: 'numeric' });
                    let content = '';

                    if (type === 'balance-sheet') {
                        content = renderNewBalanceSheet(json.data, today);
                    } else if (type === 'profit-loss') {
                        content = renderNewProfitLoss(json.data, today);
                    } else if (type === 'trial-balance') {
                        content = renderNewTrialBalance(json.data, today);
                    }

                    const container = document.getElementById('reportContent');
                    container.innerHTML = content;

                    // Remove some styles for print to fit container
                    const reportView = container.querySelector('.report-view');
                    if (reportView) {
                        reportView.style.boxShadow = 'none';
                        reportView.style.padding = '0';
                    }

                    // Hide the header inside reportView since print-container already has it
                    const innerHeader = container.querySelector('.report-header');
                    if (innerHeader) innerHeader.style.display = 'none';
                }
            } catch (e) {
                console.error('Print Error:', e);
                document.getElementById('reportContent').innerHTML = '<p class="text-center">Failed to load report data.</p>';
            }
        });
    </script>
</body>

</html>
