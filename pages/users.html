<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - FinSight</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/modern-dashboard.css?v=12">
</head>

<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="../index.html" class="brand-logo" style="display: flex; align-items: center; gap: 10px;">
                    <div style="background: var(--gs-accent); padding: 8px; border-radius: 8px; color: #000;">
                        <i class="fas fa-wallet"></i>
                    </div>
                    <div style="display: flex; flex-direction: column;">
                        <span style="font-weight: 800; font-size: 1rem; color: #fff; line-height: 1;">GOLDEN SLATE</span>
                        <span style="font-size: 0.65rem; color: var(--gs-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px;">Accounting Portal</span>
                    </div>
                </a>
            </div>

            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-link">
                    <i class="fas fa-th-large"></i>
                    <span>Dashboard</span>
                </a>
                <a href="accounts.html" class="nav-link">
                    <i class="fas fa-university"></i>
                    <span>Accounts</span>
                </a>
                <a href="vouchers.html" class="nav-link">
                    <i class="fas fa-exchange-alt"></i>
                    <span>Transactions</span>
                </a>
                <a href="reports.html" class="nav-link">
                    <i class="fas fa-file-contract"></i>
                    <span>Reports</span>
                </a>
                <a href="profile.html" class="nav-link">
                    <i class="fas fa-user"></i>
                    <span>Profile</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <a href="settings.html" class="nav-link" style="margin-bottom: 20px;">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </a>
                
                <button class="sidebar-new-entry">
                    <i class="fas fa-plus"></i>
                    <span>New Entry</span>
                </button>

                <div class="sidebar-user-profile" style="background: transparent; border-top: 1px solid var(--gs-border); padding-top: 15px; display: flex; align-items: center; gap: 12px;">
                    <div style="width: 40px; height: 40px; border-radius: 50%; background: #25241e; border: 1px solid var(--gs-border); display: flex; align-items: center; justify-content: center; overflow: hidden;">
                       <i class="fas fa-user-circle" style="color: var(--gs-accent); font-size: 1.5rem;"></i>
                    </div>
                    <div style="display: flex; flex-direction: column; overflow: hidden;">
                        <span style="font-weight: 700; font-size: 0.85rem; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Alex Thompson</span>
                        <span style="font-size: 0.75rem; color: var(--gs-muted);">Senior Admin</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="header">
                <div class="header-left">
                    <button class="mobile-toggle" id="mobileToggle">
                        <i class="fas fa-bars"></i>
                    </button>
                    <div class="header-title">
                        <h1 style="font-weight: 800; font-size: 1.5rem;">Team Oversight</h1>
                    </div>
                </div>

                <div style="flex: 1; max-width: 400px; margin: 0 40px; position: relative;" class="search-container">
                    <i class="fas fa-search" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--gs-muted); font-size: 0.9rem;"></i>
                    <input type="text" placeholder="Search members by name or role..." style="width: 100%; padding: 10px 15px 10px 45px; background: var(--gs-surface2); border: 1px solid var(--gs-border); border-radius: 10px; color: #fff; font-size: 0.85rem;">
                </div>

                <div class="header-actions">
                    <button class="btn btn-primary" style="padding: 10px 20px; border-radius: 10px; display: flex; align-items: center; gap: 8px;">
                        <i class="fas fa-user-plus"></i>
                        Add Member
                    </button>
                    
                    <button class="btn-icon" style="background: transparent; border: none; color: var(--gs-muted); font-size: 1.1rem; margin-left: 20px;">
                        <i class="fas fa-bell"></i>
                    </button>
                </div>
            </header>

            <!-- Page Content -->
            <div class="page-content" style="padding: 2rem 3rem;">
                <!-- User Stats -->
                <div class="stats-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; margin-bottom: 40px;">
                    <div class="stat-card" style="padding: 30px; display: flex; align-items: center; gap: 20px;">
                        <div style="width: 50px; height: 50px; background: #25241e; border: 1px solid var(--gs-border); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--gs-accent); font-size: 1.2rem;">
                            <i class="fas fa-users"></i>
                        </div>
                        <div>
                            <p style="color: var(--gs-muted); font-size: 0.75rem; text-transform: uppercase; font-weight: 700; letter-spacing: 1px; margin-bottom: 4px;">Total Users</p>
                            <h3 style="font-size: 1.8rem; font-weight: 800; color: #fff;">128</h3>
                        </div>
                    </div>

                    <div class="stat-card" style="padding: 30px; display: flex; align-items: center; gap: 20px;">
                        <div style="width: 50px; height: 50px; background: #25241e; border: 1px solid var(--gs-border); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--gs-success); font-size: 1.2rem;">
                            <i class="fas fa-bolt"></i>
                        </div>
                        <div>
                            <p style="color: var(--gs-muted); font-size: 0.75rem; text-transform: uppercase; font-weight: 700; letter-spacing: 1px; margin-bottom: 4px;">Active Now</p>
                            <h3 style="font-size: 1.8rem; font-weight: 800; color: #fff;">42</h3>
                        </div>
                    </div>

                    <div class="stat-card" style="padding: 30px; display: flex; align-items: center; gap: 20px;">
                        <div style="width: 50px; height: 50px; background: #25241e; border: 1px solid var(--gs-border); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--gs-warning); font-size: 1.2rem;">
                            <i class="fas fa-hourglass-half"></i>
                        </div>
                        <div>
                            <p style="color: var(--gs-muted); font-size: 0.75rem; text-transform: uppercase; font-weight: 700; letter-spacing: 1px; margin-bottom: 4px;">Pending Invites</p>
                            <h3 style="font-size: 1.8rem; font-weight: 800; color: #fff;">12</h3>
                        </div>
                    </div>
                </div>
                <div class="section-header" style="display: flex; justify-content: space-between; align-items: center;">
                    <h2>All Users</h2>
                    <button class="btn btn-primary" onclick="showAddUserModal()">
                        <i class="fas fa-user-plus"></i> Add New User
                    </button>
                </div>

                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Department</th>
                                <th>Status</th>
                                <th>Last Login</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody">
                            <tr>
                                <td colspan="7" style="text-align: center;">Loading...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit User Modal -->
    <div id="addUserModal" class="modal">
        <div class="modal-content" style="max-width: 750px;">
            <div class="modal-header">
                <h2><i class="fas fa-user-circle" style="color: var(--primary-color); margin-right: 10px;"></i>User
                    Profile</h2>
                <button onclick="closeModal('addUserModal')" class="close-modal">&times;</button>
            </div>
            <form id="addUserForm">
                <input type="hidden" id="editingUserId">
                <div class="form-grid">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> First Name</label>
                        <input type="text" id="newUserFirstName" placeholder="e.g. Rahul" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Last Name</label>
                        <input type="text" id="newUserLastName" placeholder="e.g. Sharma" required>
                    </div>
                    <div class="form-group full-width">
                        <label><i class="fas fa-envelope"></i> Email Address</label>
                        <input type="email" id="newUserEmail" placeholder="rahul.sharma@finsight.com" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-at"></i> Username</label>
                        <input type="text" id="newUserUsername" placeholder="rsharma" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-building"></i> Department</label>
                        <input type="text" id="newUserDepartment" placeholder="e.g. Finance">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-user-tag"></i> Role</label>
                        <select id="newUserRole" required>
                            <option value="accountant">Accountant</option>
                            <option value="manager">Manager</option>
                            <option value="admin">Administrator</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-key"></i> Password</label>
                        <input type="password" id="newUserPassword" placeholder="Auto-generated if empty">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary"
                    style="width: 100%; margin-top: 20px; padding: 16px; justify-content: center; font-size: 16px; font-weight: 700;">
                    <i class="fas fa-save"></i> Save User Profile
                </button>
            </form>
        </div>
    </div>

    <script src="../js/dashboard.js?v=15"></script>
    <script src="../js/admin-dashboard.js?v=15"></script>
    <script>
        function showAddUserModal() {
            document.getElementById('addUserModal').classList.add('active');
        }
        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }
    </script>
</body>

</html>
